<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Tasko — To-Do List</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f0e8;
    --surface: #fffdf8;
    --surface2: #f0ebe0;
    --ink: #1a1410;
    --ink2: #5a4f3f;
    --ink3: #9a8f7f;
    --accent: #c8491a;
    --accent2: #e8a020;
    --done: #4a8c5c;
    --border: #ddd5c5;
    --shadow: rgba(26,20,16,0.08);
    --radius: 14px;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    color: var(--ink);
    position: relative;
    overflow-x: hidden;
  }

  /* Background texture */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(circle at 15% 20%, rgba(200,73,26,0.07) 0%, transparent 50%),
      radial-gradient(circle at 85% 75%, rgba(232,160,32,0.07) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 680px;
    margin: 0 auto;
    padding: 48px 24px 80px;
    position: relative;
    z-index: 1;
  }

  /* Header */
  .header {
    margin-bottom: 40px;
  }

  .header-top {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    margin-bottom: 6px;
  }

  .logo {
    font-family: 'DM Serif Display', serif;
    font-size: 48px;
    line-height: 1;
    color: var(--ink);
    letter-spacing: -1px;
  }

  .logo span {
    color: var(--accent);
    font-style: italic;
  }

  .date-badge {
    font-size: 12px;
    font-weight: 500;
    color: var(--ink3);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 5px 12px;
    margin-bottom: 6px;
  }

  .header-subtitle {
    font-size: 14px;
    color: var(--ink3);
    font-weight: 400;
    letter-spacing: 0.01em;
  }

  /* Stats bar */
  .stats-bar {
    display: flex;
    gap: 12px;
    margin-bottom: 28px;
    flex-wrap: wrap;
  }

  .stat {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 16px;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    color: var(--ink2);
    font-weight: 500;
    box-shadow: 0 1px 3px var(--shadow);
  }

  .stat-num {
    font-family: 'DM Serif Display', serif;
    font-size: 20px;
    color: var(--ink);
    line-height: 1;
  }

  .stat-num.accent { color: var(--accent); }
  .stat-num.done { color: var(--done); }

  /* Input area */
  .input-card {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 24px;
    box-shadow: 0 2px 12px var(--shadow);
  }

  .input-row {
    display: flex;
    gap: 10px;
    align-items: stretch;
  }

  .task-input {
    flex: 1;
    border: 1.5px solid var(--border);
    background: var(--bg);
    border-radius: 10px;
    padding: 12px 16px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    color: var(--ink);
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    min-width: 0;
  }

  .task-input::placeholder { color: var(--ink3); }

  .task-input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(200,73,26,0.1);
  }

  .task-input.error {
    border-color: var(--accent);
    animation: shake 0.35s ease;
  }

  @keyframes shake {
    0%,100% { transform: translateX(0); }
    25% { transform: translateX(-6px); }
    75% { transform: translateX(6px); }
  }

  .add-btn {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 12px 22px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
    transition: background 0.18s, transform 0.12s, box-shadow 0.18s;
    box-shadow: 0 2px 8px rgba(200,73,26,0.25);
    display: flex;
    align-items: center;
    gap: 7px;
  }

  .add-btn:hover {
    background: #a83815;
    box-shadow: 0 4px 14px rgba(200,73,26,0.32);
    transform: translateY(-1px);
  }

  .add-btn:active { transform: translateY(0); }

  .add-btn svg { flex-shrink: 0; }

  .error-msg {
    font-size: 12.5px;
    color: var(--accent);
    font-weight: 500;
    margin-top: 8px;
    display: none;
    padding-left: 2px;
    animation: fadeIn 0.2s ease;
  }

  .error-msg.visible { display: block; }

  /* Filters */
  .filters {
    display: flex;
    gap: 6px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }

  .filter-btn {
    background: transparent;
    border: 1.5px solid var(--border);
    border-radius: 20px;
    padding: 6px 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    color: var(--ink2);
    cursor: pointer;
    transition: all 0.18s;
  }

  .filter-btn:hover { border-color: var(--ink3); color: var(--ink); }

  .filter-btn.active {
    background: var(--ink);
    border-color: var(--ink);
    color: #fff;
  }

  /* Task list */
  .task-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .task-item {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 18px;
    display: flex;
    align-items: center;
    gap: 14px;
    box-shadow: 0 1px 4px var(--shadow);
    animation: slideIn 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
    transition: opacity 0.2s, transform 0.2s, box-shadow 0.2s, border-color 0.2s;
    position: relative;
    overflow: hidden;
  }

  .task-item::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--accent2);
    border-radius: 4px 0 0 4px;
    opacity: 0;
    transition: opacity 0.2s;
  }

  .task-item:hover {
    box-shadow: 0 4px 16px var(--shadow);
    border-color: #ccc3b0;
    transform: translateY(-1px);
  }

  .task-item:hover::before { opacity: 1; }

  .task-item.completed { opacity: 0.65; }
  .task-item.completed::before { background: var(--done); opacity: 1; }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-10px) scale(0.98); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  @keyframes fadeOut {
    to { opacity: 0; transform: scale(0.95); max-height: 0; padding: 0; margin: 0; }
  }

  .task-item.removing {
    animation: fadeOut 0.25s ease forwards;
    pointer-events: none;
  }

  /* Custom checkbox */
  .checkbox-wrap {
    flex-shrink: 0;
    position: relative;
    width: 22px; height: 22px;
  }

  .checkbox-wrap input[type="checkbox"] {
    position: absolute;
    opacity: 0;
    width: 100%; height: 100%;
    cursor: pointer;
    z-index: 2;
  }

  .checkbox-visual {
    width: 22px; height: 22px;
    border: 2px solid var(--border);
    border-radius: 6px;
    background: var(--bg);
    display: flex; align-items: center; justify-content: center;
    transition: all 0.18s;
    pointer-events: none;
  }

  .checkbox-wrap input:checked ~ .checkbox-visual {
    background: var(--done);
    border-color: var(--done);
  }

  .checkbox-visual svg {
    opacity: 0;
    transform: scale(0.5);
    transition: all 0.15s;
  }

  .checkbox-wrap input:checked ~ .checkbox-visual svg {
    opacity: 1;
    transform: scale(1);
  }

  /* Task text */
  .task-text {
    flex: 1;
    font-size: 15px;
    color: var(--ink);
    font-weight: 400;
    line-height: 1.4;
    word-break: break-word;
    min-width: 0;
    transition: color 0.2s;
  }

  .task-item.completed .task-text {
    text-decoration: line-through;
    color: var(--ink3);
  }

  .edit-input {
    flex: 1;
    border: 1.5px solid var(--accent);
    background: var(--bg);
    border-radius: 8px;
    padding: 6px 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    color: var(--ink);
    outline: none;
    box-shadow: 0 0 0 3px rgba(200,73,26,0.1);
    min-width: 0;
  }

  /* Action buttons */
  .task-actions {
    display: flex;
    gap: 4px;
    flex-shrink: 0;
    opacity: 0;
    transition: opacity 0.18s;
  }

  .task-item:hover .task-actions,
  .task-item:focus-within .task-actions {
    opacity: 1;
  }

  .icon-btn {
    background: transparent;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    width: 34px; height: 34px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: all 0.15s;
    color: var(--ink3);
    flex-shrink: 0;
  }

  .icon-btn:hover { background: var(--surface2); color: var(--ink); border-color: var(--ink3); }

  .icon-btn.edit-btn:hover { color: var(--accent2); border-color: var(--accent2); }
  .icon-btn.save-btn { border-color: var(--done); color: var(--done); background: rgba(74,140,92,0.08); opacity: 1 !important; }
  .icon-btn.save-btn:hover { background: var(--done); color: #fff; }
  .icon-btn.delete-btn:hover { color: var(--accent); border-color: var(--accent); background: rgba(200,73,26,0.06); }

  /* Empty state */
  .empty-state {
    text-align: center;
    padding: 56px 24px;
    color: var(--ink3);
    display: none;
  }

  .empty-state.visible { display: block; }

  .empty-icon {
    font-size: 48px;
    margin-bottom: 14px;
    opacity: 0.6;
  }

  .empty-title {
    font-family: 'DM Serif Display', serif;
    font-size: 22px;
    color: var(--ink2);
    margin-bottom: 6px;
  }

  .empty-sub {
    font-size: 14px;
    line-height: 1.6;
  }

  /* Clear completed */
  .list-footer {
    display: flex;
    justify-content: flex-end;
    margin-top: 16px;
  }

  .clear-btn {
    background: transparent;
    border: none;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    color: var(--ink3);
    cursor: pointer;
    text-decoration: underline;
    text-underline-offset: 3px;
    transition: color 0.15s;
    padding: 4px 0;
  }

  .clear-btn:hover { color: var(--accent); }
  .clear-btn:disabled { opacity: 0; pointer-events: none; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(-4px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Toast notification */
  .toast {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--ink);
    color: #fff;
    font-size: 13.5px;
    font-weight: 500;
    padding: 10px 20px;
    border-radius: 30px;
    box-shadow: 0 6px 24px rgba(0,0,0,0.2);
    z-index: 999;
    transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.25s;
    opacity: 0;
    pointer-events: none;
    white-space: nowrap;
  }

  .toast.show {
    transform: translateX(-50%) translateY(0);
    opacity: 1;
  }

  /* Responsive */
  @media (max-width: 480px) {
    .container { padding: 28px 16px 64px; }
    .logo { font-size: 36px; }
    .input-row { flex-direction: column; }
    .add-btn { width: 100%; justify-content: center; }
    .task-actions { opacity: 1; }
    .stats-bar { gap: 8px; }
    .stat { padding: 8px 12px; }
  }
</style>
</head>
<body>
<div class="container">
  <!-- Header -->
  <div class="header">
    <div class="header-top">
      <h1 class="logo">Task<span>o</span></h1>
      <div class="date-badge" id="dateBadge"></div>
    </div>
    <p class="header-subtitle">Stay organised. One task at a time.</p>
  </div>

  <!-- Stats -->
  <div class="stats-bar">
    <div class="stat">
      <span class="stat-num accent" id="statTotal">0</span>
      <span>Total</span>
    </div>
    <div class="stat">
      <span class="stat-num" id="statPending">0</span>
      <span>Remaining</span>
    </div>
    <div class="stat">
      <span class="stat-num done" id="statDone">0</span>
      <span>Done</span>
    </div>
  </div>

  <!-- Input -->
  <div class="input-card">
    <div class="input-row">
      <input
        class="task-input"
        id="taskInput"
        type="text"
        placeholder="What needs to be done?"
        maxlength="200"
        autocomplete="off"
      />
      <button class="add-btn" id="addBtn" onclick="addTask()">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M8 3v10M3 8h10" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
        </svg>
        Add
      </button>
    </div>
    <div class="error-msg" id="errorMsg">⚠ Please enter a task before adding.</div>
  </div>

  <!-- Filters -->
  <div class="filters">
    <button class="filter-btn active" data-filter="all" onclick="setFilter('all')">All</button>
    <button class="filter-btn" data-filter="active" onclick="setFilter('active')">Active</button>
    <button class="filter-btn" data-filter="completed" onclick="setFilter('completed')">Completed</button>
  </div>

  <!-- Task list -->
  <div class="task-list" id="taskList"></div>

  <!-- Empty state -->
  <div class="empty-state" id="emptyState">
    <div class="empty-icon">📋</div>
    <div class="empty-title">Nothing here yet</div>
    <div class="empty-sub">Add your first task above<br>and start getting things done.</div>
  </div>

  <!-- Footer -->
  <div class="list-footer">
    <button class="clear-btn" id="clearBtn" onclick="clearCompleted()" disabled>
      Clear completed
    </button>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
  // ── State ──────────────────────────────────────────────────────────────────
  let tasks = JSON.parse(localStorage.getItem('tasko_tasks') || '[]');
  let filter = 'all';
  let editingId = null;

  // ── Init ───────────────────────────────────────────────────────────────────
  function init() {
    setDateBadge();
    render();

    const input = document.getElementById('taskInput');
    input.addEventListener('keydown', e => {
      if (e.key === 'Enter') addTask();
      if (e.key !== ' ') clearError();
    });
  }

  function setDateBadge() {
    const d = new Date();
    document.getElementById('dateBadge').textContent = d.toLocaleDateString('en-GB', {
      weekday: 'short', day: 'numeric', month: 'short'
    });
  }

  // ── Persistence ────────────────────────────────────────────────────────────
  function save() {
    localStorage.setItem('tasko_tasks', JSON.stringify(tasks));
  }

  // ── Core CRUD ──────────────────────────────────────────────────────────────
  function addTask() {
    const input = document.getElementById('taskInput');
    const text = input.value.trim();

    if (!text) {
      showError();
      input.classList.add('error');
      setTimeout(() => input.classList.remove('error'), 400);
      return;
    }

    tasks.unshift({ id: Date.now(), text, completed: false, createdAt: new Date().toISOString() });
    save();
    input.value = '';
    clearError();
    render();
    showToast('Task added ✓');
  }

  function toggleTask(id) {
    const task = tasks.find(t => t.id === id);
    if (task) {
      task.completed = !task.completed;
      save();
      render();
    }
  }

  function startEdit(id) {
    editingId = id;
    render();
    const el = document.getElementById('edit-' + id);
    if (el) { el.focus(); el.select(); }
  }

  function saveEdit(id) {
    const el = document.getElementById('edit-' + id);
    if (!el) return;
    const newText = el.value.trim();
    if (!newText) {
      showToast('Task cannot be empty ⚠');
      el.focus();
      return;
    }
    const task = tasks.find(t => t.id === id);
    if (task) task.text = newText;
    editingId = null;
    save();
    render();
    showToast('Task updated ✓');
  }

  function cancelEdit(id, e) {
    if (e && e.key && e.key !== 'Escape') return;
    editingId = null;
    render();
  }

  function deleteTask(id) {
    const el = document.querySelector(`[data-id="${id}"]`);
    if (el) {
      el.classList.add('removing');
      setTimeout(() => {
        tasks = tasks.filter(t => t.id !== id);
        save();
        render();
      }, 240);
    }
    showToast('Task deleted');
  }

  function clearCompleted() {
    tasks = tasks.filter(t => !t.completed);
    save();
    render();
    showToast('Cleared completed tasks');
  }

  // ── Filter ─────────────────────────────────────────────────────────────────
  function setFilter(f) {
    filter = f;
    document.querySelectorAll('.filter-btn').forEach(b =>
      b.classList.toggle('active', b.dataset.filter === f)
    );
    render();
  }

  function filteredTasks() {
    if (filter === 'active')    return tasks.filter(t => !t.completed);
    if (filter === 'completed') return tasks.filter(t =>  t.completed);
    return tasks;
  }

  // ── Render ─────────────────────────────────────────────────────────────────
  function render() {
    const list = document.getElementById('taskList');
    const empty = document.getElementById('emptyState');
    const clearBtn = document.getElementById('clearBtn');
    const shown = filteredTasks();

    // Stats
    const total = tasks.length;
    const done  = tasks.filter(t => t.completed).length;
    document.getElementById('statTotal').textContent   = total;
    document.getElementById('statPending').textContent = total - done;
    document.getElementById('statDone').textContent    = done;

    clearBtn.disabled = done === 0;
    empty.classList.toggle('visible', shown.length === 0);

    list.innerHTML = shown.map(task => {
      const isEditing = editingId === task.id;
      return `
        <div class="task-item ${task.completed ? 'completed' : ''}" data-id="${task.id}">
          <label class="checkbox-wrap">
            <input type="checkbox" ${task.completed ? 'checked' : ''}
              onchange="toggleTask(${task.id})" aria-label="Mark task as ${task.completed ? 'incomplete' : 'complete'}"/>
            <div class="checkbox-visual">
              <svg width="13" height="10" viewBox="0 0 13 10" fill="none">
                <path d="M1.5 5L5 8.5L11.5 1.5" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </div>
          </label>

          ${isEditing
            ? `<input class="edit-input" id="edit-${task.id}" type="text" value="${escapeHtml(task.text)}"
                maxlength="200"
                onkeydown="if(event.key==='Enter')saveEdit(${task.id}); else if(event.key==='Escape')cancelEdit(${task.id}, event);"
                aria-label="Edit task"/>`
            : `<span class="task-text">${escapeHtml(task.text)}</span>`
          }

          <div class="task-actions">
            ${isEditing
              ? `<button class="icon-btn save-btn" onclick="saveEdit(${task.id})" title="Save" aria-label="Save edit">
                  <svg width="15" height="15" viewBox="0 0 15 15" fill="none">
                    <path d="M2 7.5L6 11.5L13 3" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                  </svg>
                </button>`
              : `<button class="icon-btn edit-btn" onclick="startEdit(${task.id})" title="Edit" aria-label="Edit task">
                  <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                    <path d="M9.5 2L12 4.5L4.5 12H2v-2.5L9.5 2z" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
                  </svg>
                </button>`
            }
            <button class="icon-btn delete-btn" onclick="deleteTask(${task.id})" title="Delete" aria-label="Delete task">
              <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                <path d="M2 3.5h10M5.5 3.5V2h3v1.5M5.5 6v5M8.5 6v5M3.5 3.5l.5 8h6l.5-8" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </button>
          </div>
        </div>`;
    }).join('');
  }

  // ── Helpers ────────────────────────────────────────────────────────────────
  function showError() {
    document.getElementById('errorMsg').classList.add('visible');
  }

  function clearError() {
    document.getElementById('errorMsg').classList.remove('visible');
  }

  function escapeHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  let toastTimer;
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
  }

  // ── Boot ───────────────────────────────────────────────────────────────────
  init();
</script>
</body>
</html>
